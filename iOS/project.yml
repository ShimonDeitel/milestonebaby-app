name: Milestone
options:
  bundleIdPrefix: com.shimondeitel.babymilestone
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Milestone:
    type: application
    platform: iOS
    sources:
      - path: Milestone
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.babymilestone
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Milestone/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  MilestoneTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MilestoneTests
      - path: Milestone.storekit
    dependencies:
      - target: Milestone
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.babymilestone.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  MilestoneUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: MilestoneUITests
    dependencies:
      - target: Milestone
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.babymilestone.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Milestone:
    build:
      targets:
        Milestone: all
        MilestoneTests: [test]
        MilestoneUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Milestone.storekit
    test:
      config: Debug
      storeKitConfiguration: Milestone.storekit
      targets:
        - MilestoneTests
        - MilestoneUITests
    archive:
      config: Release
